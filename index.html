<!-- 
Ejercicio 14
Audio y Video
Insertar en una página un archivo de audio y un archivo de video usando las
etiquetas correspondientes de HTML5. Agregar los atributos necesarios para
mostrar los controles de reproducción. Debajo de cada elemento, escribir un
breve texto descriptivo. 
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 14</title>
</head>
<body>
    <h2>Audio</h2>
    <audio src="/Multimendia/audio/momo ella me llama.mp3" muted autoplay controls></audio>
    <p><span style="color: red;">Porfavor bajar volumen que esta muy fuerte el audio.</span>
    Famosa cancion de Tito calderon, Momo ella me llama, es un reggaeton que se hizo muy popular en el año 2006.
    </p>
    <br>
    <h2>Video</h2>
    <video src="/Multimendia/videos/momo.mp4" controls muted width="600px" height="400px"></video>
    <p> Video del famoso Tito calderon tirando tremendo pasos de baile en paris </p>
</html>
