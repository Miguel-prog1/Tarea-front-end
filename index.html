<!--
Ejercicio 12
Formulario con Distintos Controles
Construir un formulario que incluya:
• un campo de texto,
• un campo de contraseña,
• un campo numérico,
• botones de opción (radio) para elegir género,
• casillas de verificación (checkbox) para seleccionar intereses,
• una lista desplegable (select) con al menos tres opciones.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 12</title>
</head>

<body>
    <form>
        <fieldset>
            <legend>Formulario de gustos</legend>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Como se llama">
            <br>
            <label for="contraseña">Contraseña:</label>
            <input type="password" id="contraseña" name="contraseña" placeholder="Ingrese su contraseña">
            <br>
            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad" placeholder="Ingrese su edad">
            <br>
            <legend>Género:</legend>
            <label for="femenino">Femenino</label>
            <input type="radio" id="femenino" name="genero" value="femenino">
            <br>
            <label for="masculino">Masculino</label>
            <input type="radio" id="masculino" name="genero" value="masculino">
            <br>
            <label for="otro">Otro</label>
            <input type="radio" id="otro" name="genero" value="otro">
            <br>
            <legend>Intereses:</legend>
            <label for="interes1">Futbol</label>
            <input type="checkbox" id="interes1" name="interes1">
            <br>
            <label for="interes2">Musica</label>
            <input type="checkbox" id="interes2" name="interes2">
            <br>
            <label for="interes3">Peliculas</label>
            <input type="checkbox" id="interes3" name="interes3">
            <br>
            <label for="club">Clubes</label>
            <select id="club" name="club">
                <option value="0" disabled selected>Seleccione un club</option>
                <option value="1">Boca Juniors</option>
                <option value="2"> River Plate</option>
                <option value="3">Independiente</option>
                <option value="4">San Lorenzo</option>
                <option value="5">Huracan</option>
        </fieldset>
    </form>
</body>

</html>
