<!--Ejercicio 1
Estructura Básica
Crear un documento HTML5 que incluya las etiquetas <!DOCTYPE>, <html>, <head> y
<body>. Agregar un título en la solapa del navegador y un encabezado <h1> en el
cuerpo.-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea 1</title>
</head>
<body>
    <h1>Hola Mundo</h1>
</body>
</html>
