<!--
Ejercicio 5
Listas HTML
Crear tres tipos de listas: una desordenada (<ul>), una ordenada (<ol>) y una
de definición (<dl>) con al menos dos términos y sus descripciones.

-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Listas</h1>
    <ol>
        <li>Primer elemento ordenado</li>
        <li>Segundo elemento ordenado</li>
    </ol>
    <ul>
        <li> Elementos desordenados </li>
        <li> Elementos desordenados</li>
    </ul>
    <dl>
        <dt>Conejo</dt>
        <dd>Salta</dd>
        <dd>Come zanahorias</dd>
        <dt>Zorro</dt>
        <dd>Caza</dd>
        <dd>Persigue conejos</dd>
    </dl>
</body> 
</html>
