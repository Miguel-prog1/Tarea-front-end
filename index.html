<!--
Ejercicio 15
Tabla Completa de Horarios
Diseñar una tabla que represente un horario semanal de clases. Debe incluir:
• días de la semana como encabezados,
• franjas horarias en la primera columna,
• al menos una celda combinada usando colspan o rowspan.
-->





<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 15</title>
</head>

<body>

        </thead>
        <tbody>
            <tr>
                <td>
                    18:30 - 19:10
                </td>
                <td rowspan="6">
                    Ing de software
                </td>
                <td rowspan="6">Back end</td>
                <td rowspan="3">
                    ing de software 
                </td>
                <td rowspan="6">
                   Sistem. en la Nube
                </td>
                <td rowspan="3"> Back end</td>
            </tr>

</html>
